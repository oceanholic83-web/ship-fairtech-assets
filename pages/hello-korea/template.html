<script>
(function(){
  var bar = document.querySelector('.fct-filterbar');
  var items = document.querySelectorAll('.fct-fulllist .fct-listitem');
  if (!bar || !items.length) return;
  bar.addEventListener('click', function(e){
    var btn = e.target.closest('.fct-filter-btn');
    if (!btn) return;
    var cat = btn.getAttribute('data-cat');
    bar.querySelectorAll('.fct-filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    items.forEach(function(item){
      if (cat === 'all') {
        item.classList.remove('hidden');
      } else {
        var cats = (item.getAttribute('data-cats') || '').split(',');
        if (cats.indexOf(cat) >= 0) {
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      }
    });
  });
})();
</script>
