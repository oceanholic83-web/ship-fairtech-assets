<!-- wp:html -->
<style>.fct-port{font-family:ui-sans-serif,system-ui,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#0f172a;line-height:1.7;max-width:1100px;margin:0 auto}.fct-port *{box-sizing:border-box}.fct-cat-hero{background:linear-gradient(to right,rgba(15,23,42,0.95) 0%,rgba(15,23,42,0.6) 50%,rgba(15,23,42,0.2) 100%),url('{{heroImage}}');background-size:cover;background-position:right center;background-repeat:no-repeat;background-color:#0f172a;border-radius:14px;padding:32px 40px;margin:0 0 24px;color:#f1f5f9;position:relative;overflow:hidden}.fct-cat-hero::before{content:"";position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(94,234,212,0.08) 0%,transparent 70%);pointer-events:none}.fct-cat-label{font-size:11px;font-weight:700;color:#5eead4;letter-spacing:0.2em;margin-bottom:6px;text-transform:uppercase}.fct-cat-title{font-size:28px;font-weight:800;color:#f1f5f9;margin:0 0 6px 0;letter-spacing:-0.02em}.fct-cat-desc{font-size:14.5px;color:#cbd5e1;margin:0 0 12px 0;line-height:1.65;max-width:620px}.fct-cat-count{display:inline-block;font-size:12px;font-weight:700;color:#5eead4;background:rgba(94,234,212,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(94,234,212,0.2)}@media (max-width:768px){.fct-cat-hero{background:linear-gradient(to right,rgba(15,23,42,0.95) 0%,rgba(15,23,42,0.85) 100%),url('{{heroImage}}');background-size:cover;background-position:right center;background-repeat:no-repeat;padding:28px 24px}.fct-cat-title{font-size:24px}}</style>

<div class="fct-port">

<section class="fct-cat-hero"><div class="fct-cat-label">{{eyebrow}}</div><h1 class="fct-cat-title">{{title}}</h1><p class="fct-cat-desc">{{description}}</p><div class="fct-cat-count">{{badge}}</div></section>

<script>window.PORT_ATLAS_CONFIG={mapboxToken:'{{mapboxToken}}'};</script>
<div id="korea-port-app"></div>
<script src="{{loaderUrl}}"></script>

</div>
<!-- /wp:html -->
