<!-- wp:html -->
<style>.fct-port{font-family:ui-sans-serif,system-ui,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#0f172a;line-height:1.7;max-width:1100px;margin:0 auto}.fct-port *{box-sizing:border-box}.fct-cat-hero{background:linear-gradient(to right,rgba(15,23,42,0.95) 0%,rgba(15,23,42,0.6) 50%,rgba(15,23,42,0.2) 100%),url('{{heroImage}}');background-size:cover;background-position:right center;background-repeat:no-repeat;background-color:#0f172a;border-radius:14px;padding:32px 40px;margin:0 0 24px;color:#f1f5f9;position:relative;overflow:hidden}.fct-cat-hero::before{content:"";position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(94,234,212,0.08) 0%,transparent 70%);pointer-events:none}.fct-cat-label{font-size:11px;font-weight:700;color:#5eead4;letter-spacing:0.2em;margin-bottom:6px;text-transform:uppercase}.fct-cat-title{font-size:28px;font-weight:800;color:#f1f5f9;margin:0 0 6px 0;letter-spacing:-0.02em}.fct-cat-desc{font-size:14.5px;color:#cbd5e1;margin:0 0 12px 0;line-height:1.65;max-width:620px}.fct-cat-count{display:inline-block;font-size:12px;font-weight:700;color:#5eead4;background:rgba(94,234,212,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(94,234,212,0.2)}.fct-port-articles{margin:40px 0 32px}.fct-section-header{margin:0 0 20px;padding-bottom:12px;border-bottom:2px solid #0f172a}.fct-section-title{font-size:22px;font-weight:800;color:#0f172a;margin:0 0 8px 0;letter-spacing:-0.01em}.fct-section-desc{font-size:14px;color:#64748b;margin:0;line-height:1.65}.fct-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:0 0 32px}.fct-bigcard{display:block;text-decoration:none;color:inherit;background:#fff;border-radius:10px;overflow:hidden;transition:transform 0.2s ease,box-shadow 0.2s ease;border:1px solid #e2e8f0}.fct-bigcard:hover{transform:translateY(-4px);box-shadow:0 16px 32px -12px rgba(15,23,42,0.15)}.fct-bigcard-img{aspect-ratio:16/10;background:#f1f5f9;display:block;width:100%;height:auto;object-fit:cover}.fct-bigcard-body{padding:18px 20px 22px}.fct-bigcard-tag{display:inline-block;font-size:10px;font-weight:600;color:#64748b;letter-spacing:0.06em;margin-bottom:8px;line-height:1.6}.fct-bigcard-ttl{font-size:16px;font-weight:700;color:#0f172a;margin:0 0 8px 0;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.fct-bigcard-exc{font-size:13.5px;color:#64748b;line-height:1.6;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}@media (max-width:1024px){.fct-card-grid{grid-template-columns:repeat(2,1fr)}}@media (max-width:768px){.fct-cat-hero{background:linear-gradient(to right,rgba(15,23,42,0.95) 0%,rgba(15,23,42,0.85) 100%),url('{{heroImage}}');background-size:cover;background-position:right center;background-repeat:no-repeat;padding:28px 24px}.fct-cat-title{font-size:24px}.fct-card-grid{grid-template-columns:1fr}}</style>

<div class="fct-port">

<section class="fct-cat-hero"><div class="fct-cat-label">{{eyebrow}}</div><h1 class="fct-cat-title">{{title}}</h1><p class="fct-cat-desc">{{description}}</p><div class="fct-cat-count">{{badge}}</div></section>

<script>window.PORT_ATLAS_CONFIG = {
  mapboxToken: '{{mapboxToken}}',
  hideIntro: true
};</script>
<div id="korea-port-app"></div>
<script src="{{loaderUrl}}"></script>

<section class="fct-port-articles">
  <div class="fct-section-header">
    <h2 class="fct-section-title">12개 무역항 가이드</h2>
    <p class="fct-section-desc">각 무역항의 입항 절차, 시설, 운영 구조를 정리한 글입니다.</p>
  </div>
  <div class="fct-card-grid">
{{cards}}
  </div>
</section>

</div>
<!-- /wp:html -->
